<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INFUSO Admin · Login</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>INFUSO Admin</h1>
      <p class="hint">Sign in to manage orders and products.</p>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" autocomplete="username" required />
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
        <button type="submit" class="btn">Sign in</button>
      </form>
      <div id="error" class="error-msg" style="display:none;"></div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';
      try {
        await api('/login', { method: 'POST', body: JSON.stringify({ email, password }) }, { redirectOn401: false });
        window.location.href = '/admin/orders.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
