<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>INFUSO Admin · Orders</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-main">
    <h1>Orders</h1>
    <p class="page-sub">All customer orders, newest first.</p>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Order #</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Contact</th>
            <th>Items</th>
            <th>Total</th>
            <th>Payment</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr><td colspan="8" class="hint">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="admin.js"></script>
  <script src="orders.js"></script>
</body>
</html>
